# Didi client related defaults
# mode: mock | http
didi.api.mode=${DIDI_API_MODE:mock}
didi.api.base-url=${DIDI_API_BASE_URL:}
didi.api.update-path=${DIDI_API_UPDATE_PATH:/v1/price/update}
didi.api.auth-type=${DIDI_API_AUTH_TYPE:token}
didi.api.token=${DIDI_API_TOKEN:}
didi.api.oauth.token-url=${DIDI_OAUTH_TOKEN_URL:}
didi.api.client-id=${DIDI_CLIENT_ID:}
didi.api.client-secret=${DIDI_CLIENT_SECRET:}
didi.api.signature-secret=${DIDI_SIGNATURE_SECRET:}
didi.api.rate-limit-per-second=${DIDI_RATE_LIMIT_PER_SECOND:5}
didi.api.retry-count=${DIDI_RETRY_COUNT:3}
didi.api.batch-update-enabled=${DIDI_BATCH_UPDATE_ENABLED:false}
